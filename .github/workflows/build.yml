name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip python3-virtualenv \
            autoconf libtool libtool-bin m4 pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev \
            automake autopoint gettext

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install buildozer
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install buildozer cython==0.29.37

      - name: Build APK
        run: |
          source venv/bin/activate
          yes | buildozer android debug 2>&1 | tee build.log
        timeout-minutes: 120

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iptv-finder-apk
          path: bin/*.apk
          if-no-files-found: warn

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
